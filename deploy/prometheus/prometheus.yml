# Prometheus scrape config for the local AIOps assistant.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: aiops-assistant-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:9900
        labels:
          service: aiops-assistant-api

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
